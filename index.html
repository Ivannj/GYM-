<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entrenos">
<meta name="theme-color" content="#131110">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<title>Mis Entrenos</title>
<style>
:root{--bg:#131110;--panel:#1B1815;--panel2:#26211A;--line:#2E2921;--ink:#F4EFE6;--mut:#9C937F;
 --acc:#E8A33D;--accink:#221703;--green:#7FBF8E;--warn:#E8794A;
 --safetop:env(safe-area-inset-top);--safebot:env(safe-area-inset-bottom)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;position:fixed;width:100%;
 background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;font-size:16px;
 overscroll-behavior:none}
#app{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
 padding:calc(var(--safetop) + 18px) 16px calc(var(--safebot) + 116px);max-width:520px;margin:0 auto;width:100%;left:50%;transform:translateX(-50%)}
h1{font-size:24px;font-weight:750;letter-spacing:-.3px;margin:0}
h1 em{color:var(--acc);font-style:normal}
.sub{color:var(--mut);font-size:13.5px;margin:3px 0 18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
.tap{cursor:pointer;transition:border-color .12s}
.tap:active{border-color:var(--acc)}
.note{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line);
 border-radius:16px;padding:12px 14px;font-size:13.5px;color:var(--mut);margin-bottom:14px;line-height:1.45}
.note b{color:var(--acc)}
.rowflex{display:flex;justify-content:space-between;align-items:center;gap:10px}
.daytitle{font-size:17px;font-weight:700;margin:0;letter-spacing:-.2px}
.daysub{margin:3px 0 0;color:var(--mut);font-size:13px}
.badge{font-size:12px;font-weight:650;padding:5px 11px;border-radius:20px;white-space:nowrap}
.badge.done{background:rgba(127,191,142,.14);color:var(--green)}
.badge.todo{background:var(--panel2);color:var(--mut)}
.gear{background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:12px;
 width:42px;height:42px;font-size:19px;cursor:pointer}
/* calendario */
.cal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.calhead b{font-size:15.5px;font-weight:700;text-transform:capitalize}
.calnav{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;
 width:34px;height:34px;font-size:15px;cursor:pointer}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.caldow{font-size:10.5px;color:var(--mut);font-weight:650;text-transform:uppercase;padding:4px 0}
.cald{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;
 font-size:13.5px;color:var(--ink);position:relative}
.cald.off{color:var(--line)}
.cald.hoy{outline:1.5px solid var(--acc);outline-offset:-1.5px;font-weight:750}
.cald.gym{background:var(--acc);color:var(--accink);font-weight:750}
.stats2{display:flex;gap:12px;margin-bottom:12px}
.stats2 .card{flex:1;margin:0;text-align:center;padding:13px 8px}
.stats2 b{font-size:24px;font-weight:800;display:block;letter-spacing:-.5px}
.stats2 span{font-size:12px;color:var(--mut)}
.bigbtn{display:block;width:100%;background:var(--acc);color:var(--accink);border:none;border-radius:14px;
 padding:15px;font-size:16px;font-weight:750;cursor:pointer;font-family:inherit;margin-bottom:12px}
.weekline{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line);font-size:14px}
.weekline:last-child{border-bottom:none}
.weekline .n{color:var(--mut)}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(27,24,21,.96);backdrop-filter:blur(14px);
 -webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto;
 padding-bottom:var(--safebot);z-index:9}
.tab{flex:1;padding:12px 0 10px;text-align:center;background:none;border:none;color:var(--mut);
 font-size:11px;font-weight:650;letter-spacing:.2px;cursor:pointer;font-family:inherit;position:relative}
.tab.on{color:var(--acc)}
.tab.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:3px;
 border-radius:0 0 4px 4px;background:var(--acc)}
.back{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:14px;font-weight:650;
 padding:9px 14px;border-radius:11px;margin-bottom:14px;cursor:pointer;font-family:inherit}
.swipehint{color:var(--mut);font-size:11.5px;margin:-8px 0 12px}
.ex{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.extop{display:flex;gap:11px;align-items:flex-start}
.exim{width:62px;height:62px;object-fit:cover;border-radius:12px;border:1px solid var(--line);background:#fff;flex:none;
 cursor:pointer;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.excontent{flex:1;min-width:0}
.exhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.exhead h4{margin:0;font-size:15px;font-weight:650;letter-spacing:-.1px}
.target{color:var(--acc);font-size:12.5px;font-weight:650;white-space:nowrap;text-align:right}
.swap{background:none;border:none;color:var(--mut);font-size:15px;cursor:pointer;padding:2px 4px;flex:none}
.prev{font-size:12px;color:var(--mut);margin:5px 0 4px}
.prev b{color:var(--ink);font-weight:600}
.srow{display:flex;align-items:center;gap:8px;margin-top:9px}
.srow .n{width:24px;color:var(--mut);font-size:12.5px;font-weight:650}
input.f,select.f,textarea.f{background:var(--panel2);border:1px solid var(--line);border-radius:11px;color:var(--ink);
 padding:12px 11px;font-size:16px;font-family:inherit;width:100%;min-width:0;appearance:none}
input.f{flex:1}
input.f:focus,textarea.f:focus{outline:none;border-color:var(--acc)}
input.f.done{border-color:rgba(127,191,142,.6)}
.x{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:4px;flex:none}
.addset{background:none;border:1px dashed var(--line);color:var(--mut);border-radius:11px;width:100%;padding:10px;
 margin-top:10px;cursor:pointer;font-family:inherit;font-size:13px}
.addex{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:14px;width:100%;padding:14px;
 cursor:pointer;font-family:inherit;font-size:14.5px;font-weight:650;margin-bottom:12px}
.savebtn{position:fixed;bottom:calc(58px + var(--safebot));left:16px;right:16px;max-width:488px;margin:0 auto;
 background:var(--acc);color:var(--accink);border:none;border-radius:14px;padding:15px;font-size:16.5px;font-weight:750;
 letter-spacing:.2px;cursor:pointer;box-shadow:0 6px 24px rgba(232,163,61,.3);font-family:inherit;z-index:8}
/* cronómetro de sesión */
.crono{position:sticky;top:calc(var(--safetop) + 4px);z-index:5;background:rgba(38,33,26,.97);backdrop-filter:blur(10px);
 -webkit-backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:14px;
 display:flex;align-items:center;gap:10px}
.crono .t{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;flex:1;letter-spacing:-.5px}
.crono .t.pausa{color:var(--mut)}
.cbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;
 width:44px;height:40px;font-size:16px;cursor:pointer}
.cbtn.warn{color:var(--warn);border-color:rgba(232,121,74,.4)}
.hcard .top{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hcard h4{margin:0;font-size:16px;font-weight:700}
.fecha{color:var(--mut);font-size:13px;text-align:right}
.hdet{margin-top:11px;border-top:1px solid var(--line);padding-top:11px;font-size:13px}
.hdet .ln{display:flex;justify-content:space-between;padding:3px 0;gap:12px}
.hdet .ln span:last-child{color:var(--mut);text-align:right}
.smallbtn{background:none;border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:7px 13px;
 font-size:13px;cursor:pointer;font-family:inherit}
.smallbtn.danger{color:var(--warn);border-color:rgba(232,121,74,.4)}
.empty{text-align:center;color:var(--mut);padding:44px 20px;font-size:14px;line-height:1.5}
select.f{margin-bottom:12px}
.stat{display:flex;gap:20px;margin-bottom:8px}
.stat div b{font-size:20px;display:block;font-weight:750}
.stat div span{font-size:12px;color:var(--mut)}
.toast{position:fixed;top:calc(14px + var(--safetop));left:50%;transform:translateX(-50%);
 background:var(--green);color:#0e1a12;padding:11px 20px;border-radius:12px;font-weight:650;font-size:14px;z-index:99;
 box-shadow:0 6px 20px rgba(0,0,0,.4)}
.toast.warn{background:var(--warn);color:#2a1108}
label.lbl{display:block;font-size:12px;color:var(--mut);margin:0 0 8px;font-weight:650;text-transform:uppercase;letter-spacing:.7px}
.overlay{position:fixed;inset:0;background:rgba(19,17,16,.98);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;
 padding:calc(var(--safetop) + 14px) 16px calc(var(--safebot) + 40px);max-width:520px;margin:0 auto;width:100%;left:50%;transform:translateX(-50%)}
.pickitem{display:flex;gap:10px;align-items:center;padding:10px;cursor:pointer}
.libitem{display:flex;gap:11px;align-items:center;padding:11px;cursor:pointer}
.libitem .exim,.pickitem .exim{width:54px;height:54px}
.groupchip{display:inline-block;background:var(--panel2);color:var(--mut);border-radius:20px;padding:3px 9px;font-size:11px;margin-top:2px}
.detimgs{display:flex;gap:10px;margin:14px 0}
.detimgs figure{flex:1;margin:0}
.detimgs img{width:100%;border-radius:14px;border:1px solid var(--line);background:#fff;display:block}
.detimgs figcaption{text-align:center;color:var(--mut);font-size:12px;margin-top:6px;font-weight:650}
.detdesc{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;font-size:14.5px;line-height:1.55;color:var(--ink)}
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabbar" id="tabbar"></nav>
<script>
/* ================= RUTINA ================= */
const RUTINA=[
 {id:"empuje",nombre:"Torso Empuje",sub:"Pecho, hombro, tríceps + cinta",ejercicios:[
  {id:"e1",img:"machine-bench-press",nombre:"Press pecho en máquina",series:4,reps:"10-12"},
  {id:"e2",img:"leverage-shoulder-press",nombre:"Press hombros en máquina",series:3,reps:"10-12"},
  {id:"e3",img:"leverage-iso-row",nombre:"Remo en máquina (apoyo pecho)",series:4,reps:"10-12"},
  {id:"e4",img:"butterfly",nombre:"Pec deck (contractora)",series:3,reps:"12-15"},
  {id:"e5",img:"side-lateral-raise",nombre:"Elevaciones laterales (ligeras)",series:3,reps:"12-15"},
  {id:"e6",img:"triceps-pushdown",nombre:"Tríceps en polea",series:3,reps:"12"},
  {id:"e7",img:"walking-treadmill",nombre:"Cinta: caminar (pasos)",series:1,cardio:true,cinta:true}]},
 {id:"pierna",nombre:"Pierna",sub:"Sin sentadillas, todo con apoyo",ejercicios:[
  {id:"p1",img:"leg-press",nombre:"Prensa de piernas",series:4,reps:"10-12"},
  {id:"p2",img:"lying-leg-curls",nombre:"Curl femoral tumbado",series:3,reps:"12"},
  {id:"p3",img:"leg-extensions",nombre:"Extensión de cuádriceps",series:3,reps:"15"},
  {id:"p4",img:"thigh-abductor",nombre:"Abducción de cadera en máquina",series:3,reps:"15"},
  {id:"p5",img:"calf-press-on-the-leg-press-machine",nombre:"Gemelos en prensa",series:4,reps:"15"},
  {id:"p6",img:"butt-lift-bridge",nombre:"Puente de glúteo (suelo)",series:3,reps:"12"},
  {id:"p7",img:"ab-crunch-machine",nombre:"Crunch en máquina",series:3,reps:"15"},
  {id:"p8",img:"bicycling-stationary",nombre:"Bici suave",series:1,cardio:true,bici:true}]},
 {id:"traccion",nombre:"Torso Tracción",sub:"Espalda, bíceps + cuerda",ejercicios:[
  {id:"t1",img:"wide-grip-lat-pulldown",nombre:"Jalón al pecho",series:4,reps:"8-10"},
  {id:"t2",img:"seated-cable-rows",nombre:"Remo en polea baja",series:4,reps:"10-12"},
  {id:"t3",img:"leverage-incline-chest-press",nombre:"Press inclinado en máquina",series:3,reps:"10-12"},
  {id:"t4",img:"face-pull",nombre:"Face pulls",series:3,reps:"15"},
  {id:"t5",img:"dumbbell-bicep-curl",nombre:"Curl bíceps mancuernas",series:3,reps:"12"},
  {id:"t6",img:"machine-triceps-extension",nombre:"Extensión tríceps en máquina",series:3,reps:"12"},
  {id:"t7",img:"rope-jumping",nombre:"Salto a la cuerda",series:1,cardio:true,cuerda:true},
  {id:"t8",img:"walking-treadmill",nombre:"Cinta: caminar (pasos)",series:1,cardio:true,cinta:true}]},
 {id:"fullbody",nombre:"Full Body",sub:"Ligero + cardio largo",ejercicios:[
  {id:"f1",img:"leg-press",nombre:"Prensa de piernas (ligera)",series:3,reps:"12-15"},
  {id:"f2",img:"seated-leg-curl",nombre:"Curl femoral sentado",series:3,reps:"12"},
  {id:"f3",img:"leverage-chest-press",nombre:"Press pecho máquina",series:3,reps:"10-12"},
  {id:"f4",img:"leverage-high-row",nombre:"Remo alto en máquina",series:3,reps:"10-12"},
  {id:"f5",img:"plank",nombre:"Plancha",series:3,reps:"30-45s",cardio:true,hint:"ej. 3×40s"},
  {id:"f6",img:"walking-treadmill",nombre:"Cinta: caminar (el día largo)",series:1,cardio:true,cinta:true}]}
];
const ALLEX=RUTINA.flatMap(d=>d.ejercicios.map(e=>({...e,dia:d.nombre})));
const CATALOGO=[{"s":"barbell-bench-press-medium-grip","n":"Press banca con barra","g":"Pecho","d":"Tumbado en banco, baja la barra al pecho con control y empuja soltando el aire. Pies firmes en el suelo y escápulas juntas; no rebotes la barra en el pecho."},{"s":"dumbbell-bench-press","n":"Press banca mancuernas","g":"Pecho","d":"Como el press de banca pero con mancuernas: más recorrido y más amable con el hombro. Bájalas hasta la altura del pecho y empuja juntándolas arriba sin chocarlas."},{"s":"dumbbell-bench-press-with-neutral-grip","n":"Press banca mancuernas agarre neutro","g":"Pecho","d":"Press con las palmas enfrentadas: la variante más cómoda para el hombro. Ideal si el press normal molesta."},{"s":"incline-dumbbell-press","n":"Press inclinado mancuernas","g":"Pecho","d":"En banco inclinado (30-45°), trabaja la parte alta del pecho. Baja las mancuernas a los lados del pecho y empuja hacia arriba, no hacia la cara."},{"s":"barbell-incline-bench-press-medium-grip","n":"Press inclinado con barra","g":"Pecho","d":"Press con barra en banco inclinado para pecho superior. Baja a la parte alta del pecho con control."},{"s":"decline-dumbbell-bench-press","n":"Press declinado mancuernas","g":"Pecho","d":"Press en banco declinado, énfasis en pecho inferior. Menos habitual; el plano llano ya lo cubre casi todo."},{"s":"machine-bench-press","n":"Press pecho en máquina","g":"Pecho","d":"Press de pecho guiado por máquina: perfecto para aprender el patrón con seguridad. Ajusta el asiento para que las agarraderas queden a la altura del pecho y empuja soltando el aire."},{"s":"leverage-chest-press","n":"Press pecho máquina palanca","g":"Pecho","d":"Press de pecho en máquina de palanca con discos. Espalda pegada al respaldo y empuje controlado; no bloquees los codos de golpe."},{"s":"leverage-incline-chest-press","n":"Press inclinado máquina palanca","g":"Pecho","d":"Press inclinado en máquina: pecho superior con total estabilidad. Buena alternativa al banco inclinado libre."},{"s":"cable-crossover","n":"Cruces en polea","g":"Pecho","d":"De pie entre dos poleas altas, junta las manos delante del pecho con brazos casi rectos, como abrazando un barril. Movimiento de aislamiento, peso moderado."},{"s":"dumbbell-flyes","n":"Aperturas con mancuernas","g":"Pecho","d":"Tumbado, abre los brazos con ligera flexión de codo y ciérralos como un abrazo. Baja solo hasta notar estiramiento suave, no fuerces el hombro."},{"s":"incline-dumbbell-flyes","n":"Aperturas inclinadas mancuernas","g":"Pecho","d":"Aperturas en banco inclinado para el pecho superior. Codos ligeramente flexionados fijos durante todo el recorrido."},{"s":"butterfly","n":"Pec deck (contractora)","g":"Pecho","d":"Máquina contractora: junta los brazos delante del pecho apretando 1 segundo al cierre. Aislamiento seguro del pectoral, ideal para acabar."},{"s":"pushups","n":"Flexiones","g":"Pecho","d":"Flexiones en el suelo: cuerpo recto como una tabla, baja el pecho y empuja. Si pesan mucho, hazlas con las manos apoyadas en un banco (más fácil cuanto más alto)."},{"s":"wide-grip-lat-pulldown","n":"Jalón al pecho agarre ancho","g":"Espalda","d":"Sentado, tira de la barra hacia la parte alta del pecho con agarre ancho, llevando los codos abajo y atrás. Pecho fuera y sin balancearte."},{"s":"close-grip-front-lat-pulldown","n":"Jalón al pecho agarre cerrado","g":"Espalda","d":"Jalón con agarre estrecho: más recorrido y participación de bíceps. Tira hacia el pecho, no hacia el cuello."},{"s":"v-bar-pulldown","n":"Jalón con barra V","g":"Espalda","d":"Jalón con maneral en V (palmas enfrentadas), muy cómodo para hombro y codo. Saca pecho al tirar."},{"s":"straight-arm-pulldown","n":"Pullover en polea brazos rectos","g":"Espalda","d":"De pie frente a la polea alta, baja la barra hasta las caderas con los brazos casi rectos. Aísla el dorsal sin cargar el bíceps."},{"s":"seated-cable-rows","n":"Remo en polea baja","g":"Espalda","d":"Sentado, tira del maneral hacia el abdomen llevando los hombros atrás. Espalda recta: el movimiento sale de los codos, no de balancear el tronco."},{"s":"bent-over-barbell-row","n":"Remo con barra","g":"Espalda","d":"Remo con barra inclinando el tronco. Exigente para la zona lumbar: si estás empezando, prefiere las versiones en máquina o con apoyo."},{"s":"one-arm-dumbbell-row","n":"Remo mancuerna a una mano","g":"Espalda","d":"Con rodilla y mano apoyadas en un banco, tira de la mancuerna hacia la cadera. El apoyo protege la lumbar; no gires el tronco al subir."},{"s":"leverage-high-row","n":"Remo alto en máquina","g":"Espalda","d":"Remo alto en máquina de palanca: tira de arriba hacia ti, mezcla de jalón y remo. Pecho apoyado si la máquina lo permite."},{"s":"leverage-iso-row","n":"Remo en máquina (apoyo pecho)","g":"Espalda","d":"Remo en máquina con el pecho apoyado en el respaldo: la opción más segura para la espalda baja. Tira de los codos hacia atrás juntando las escápulas."},{"s":"t-bar-row-with-handle","n":"Remo en T","g":"Espalda","d":"Remo en T a caballo de la barra. Potente para toda la espalda; mantén la lumbar neutra en todo momento."},{"s":"pullups","n":"Dominadas","g":"Espalda","d":"Dominadas: colgado de la barra, sube hasta pasar la barbilla. Con tu peso actual, usa la máquina asistida o gomas; llegarán con el tiempo."},{"s":"chin-up","n":"Dominadas supinas","g":"Espalda","d":"Dominada con palmas hacia ti: más bíceps y algo más fácil que la dominada normal. También en máquina asistida al principio."},{"s":"inverted-row","n":"Remo invertido","g":"Espalda","d":"Remo colgado de una barra baja con los pies en el suelo, cuerpo recto. Cuanto más vertical estés, más fácil."},{"s":"bent-over-two-dumbbell-row","n":"Remo con dos mancuernas","g":"Espalda","d":"Remo con dos mancuernas inclinando el tronco. Versión sin banco del remo a una mano; exige lumbar fuerte."},{"s":"hyperextensions-back-extensions","n":"Hiperextensiones lumbares","g":"Espalda","d":"En el banco romano, baja el tronco y sube hasta la línea recta apretando glúteo. No hiperextiendas arriba; fortalece la espalda baja con suavidad."},{"s":"face-pull","n":"Face pull","g":"Espalda","d":"Tira de la cuerda de la polea hacia la cara, separando las manos y llevando los codos altos y atrás. Oro para la salud del hombro; peso ligero y muchas reps."},{"s":"seated-dumbbell-press","n":"Press militar sentado mancuernas","g":"Hombros","d":"Sentado con respaldo, empuja las mancuernas desde los hombros hasta arriba. El respaldo protege la lumbar; baja hasta la altura de las orejas."},{"s":"dumbbell-shoulder-press","n":"Press de hombros mancuernas","g":"Hombros","d":"Press de hombros con mancuernas de pie o sentado. Abdomen firme y sin arquear la espalda al empujar."},{"s":"barbell-shoulder-press","n":"Press militar con barra","g":"Hombros","d":"Press militar con barra. Exige buena movilidad de hombro; si molesta, usa mancuernas o máquina."},{"s":"arnold-dumbbell-press","n":"Press Arnold","g":"Hombros","d":"Press girando las palmas durante la subida (empiezan mirándote y acaban al frente). Recorrido largo y fluido, peso moderado."},{"s":"leverage-shoulder-press","n":"Press hombros en máquina","g":"Hombros","d":"Press de hombros en máquina: trayectoria guiada y espalda apoyada, la opción más segura para empezar. Empuja sin bloquear los codos de golpe."},{"s":"side-lateral-raise","n":"Elevaciones laterales","g":"Hombros","d":"De pie, eleva las mancuernas a los lados hasta la altura de los hombros, codos ligeramente flexionados. Peso ligero, sin balanceo y sin pasar de la horizontal."},{"s":"front-dumbbell-raise","n":"Elevaciones frontales","g":"Hombros","d":"Eleva la mancuerna al frente hasta la altura del hombro, alternando brazos. Peso ligero; el hombro frontal ya trabaja mucho en los press."},{"s":"seated-bent-over-rear-delt-raise","n":"Pájaros sentado (deltoide posterior)","g":"Hombros","d":"Sentado e inclinado hacia delante, abre los brazos a los lados como alas. Trabaja el deltoides posterior, clave para la postura."},{"s":"reverse-machine-flyes","n":"Aperturas invertidas en máquina","g":"Hombros","d":"En la contractora invertida, abre los brazos hacia atrás. Deltoides posterior y espalda alta con total estabilidad."},{"s":"cable-rear-delt-fly","n":"Aperturas posteriores en polea","g":"Hombros","d":"Aperturas posteriores en polea, cruzando los cables. Movimiento fino: peso muy ligero y control."},{"s":"standing-dumbbell-upright-row","n":"Remo al mentón mancuernas","g":"Hombros","d":"Remo al mentón con mancuernas: sube los codos hacia arriba, no muy por encima de los hombros. Si notas pinzamiento, cámbialo por elevaciones laterales."},{"s":"dumbbell-bicep-curl","n":"Curl bíceps mancuernas","g":"Bíceps","d":"Curl clásico: sube las mancuernas girando las palmas hacia arriba, codos pegados al cuerpo. Baja despacio, sin balancear el tronco."},{"s":"dumbbell-alternate-bicep-curl","n":"Curl alterno mancuernas","g":"Bíceps","d":"Curl alternando un brazo y otro: permite concentrarte en cada repetición. Codo fijo al costado."},{"s":"barbell-curl","n":"Curl con barra","g":"Bíceps","d":"Curl con barra recta: permite más peso. Muñecas al frente; si molestan, usa la barra Z."},{"s":"ez-bar-curl","n":"Curl con barra Z","g":"Bíceps","d":"Curl con barra Z: el ángulo del agarre protege muñecas y codos. La mejor barra para el curl."},{"s":"hammer-curls","n":"Curl martillo","g":"Bíceps","d":"Curl con palmas enfrentadas (como martillos): trabaja bíceps y antebrazo. Muy amable con el codo."},{"s":"preacher-curl","n":"Curl predicador (banco Scott)","g":"Bíceps","d":"Curl en banco Scott, con los brazos apoyados en el cojín: imposible hacer trampa. Estira abajo con control, sin soltar el peso de golpe."},{"s":"concentration-curls","n":"Curl concentrado","g":"Bíceps","d":"Sentado, con el codo apoyado en el muslo interno, sube la mancuerna concentrándote en apretar el bíceps."},{"s":"incline-dumbbell-curl","n":"Curl inclinado mancuernas","g":"Bíceps","d":"Curl tumbado en banco inclinado: el bíceps trabaja desde estiramiento máximo. Peso moderado."},{"s":"standing-biceps-cable-curl","n":"Curl en polea","g":"Bíceps","d":"Curl en polea baja: tensión constante durante todo el recorrido. Codos fijos al costado."},{"s":"triceps-pushdown","n":"Tríceps en polea (barra)","g":"Tríceps","d":"En polea alta, empuja la barra hacia abajo hasta estirar los brazos, codos pegados al cuerpo. Solo se mueve el antebrazo."},{"s":"triceps-pushdown-rope-attachment","n":"Tríceps en polea (cuerda)","g":"Tríceps","d":"Igual que el pushdown pero con cuerda: al final separa las manos hacia fuera para apretar más. Muy cómodo para el codo."},{"s":"ez-bar-skullcrusher","n":"Press francés barra Z","g":"Tríceps","d":"Tumbado, baja la barra Z hacia la frente flexionando solo los codos y estira. Peso moderado y control total."},{"s":"lying-triceps-press","n":"Press francés tumbado","g":"Tríceps","d":"Press francés tumbado: baja la barra por detrás de la cabeza y estira los brazos. Codos apuntando al techo todo el rato."},{"s":"standing-dumbbell-triceps-extension","n":"Extensión tríceps mancuerna sobre cabeza","g":"Tríceps","d":"Con una mancuerna a dos manos por detrás de la cabeza, estira los brazos hacia arriba. Codos cerca de las orejas."},{"s":"cable-rope-overhead-triceps-extension","n":"Extensión tríceps polea sobre cabeza","g":"Tríceps","d":"Extensión sobre la cabeza con cuerda en polea: gran estiramiento del tríceps. Tronco estable, ligera inclinación adelante."},{"s":"dips-triceps-version","n":"Fondos en paralelas (tríceps)","g":"Tríceps","d":"Fondos en paralelas con el cuerpo vertical. Muy exigentes con tu peso actual: usa la máquina asistida o déjalos para más adelante."},{"s":"machine-triceps-extension","n":"Extensión tríceps en máquina","g":"Tríceps","d":"Extensión de tríceps en máquina: guiado y seguro. Perfecto si no hay polea disponible."},{"s":"bench-dips","n":"Fondos en banco","g":"Tríceps","d":"Fondos con las manos en un banco y los pies en el suelo. Baja solo hasta donde el hombro esté cómodo; cuanto más flexiones las rodillas, más fácil."},{"s":"barbell-shrug","n":"Encogimientos con barra","g":"Trapecios","d":"Con la barra colgando, encoge los hombros hacia las orejas y baja despacio. No gires los hombros en círculo, solo arriba y abajo."},{"s":"dumbbell-shrug","n":"Encogimientos con mancuernas","g":"Trapecios","d":"Encogimientos con mancuernas a los lados: más natural para los hombros que la barra. Sube, aprieta 1 segundo y baja."},{"s":"leg-press","n":"Prensa de piernas","g":"Cuádriceps","d":"Tu sentadilla segura: espalda pegada al respaldo, baja la plataforma con control hasta unos 90° y empuja con toda la planta. No despegues la cadera del asiento ni bloquees las rodillas arriba."},{"s":"narrow-stance-leg-press","n":"Prensa postura estrecha","g":"Cuádriceps","d":"Prensa con los pies juntos y bajos en la plataforma: más énfasis en el cuádriceps. Rango cómodo, sin forzar la rodilla."},{"s":"barbell-squat","n":"Sentadilla con barra","g":"Cuádriceps","d":"La sentadilla con barra es el rey de los ejercicios, pero exige técnica y movilidad. Para tu momento actual, la prensa la sustituye perfectamente; ya llegará."},{"s":"front-barbell-squat","n":"Sentadilla frontal","g":"Cuádriceps","d":"Sentadilla con la barra delante, sobre los hombros. Más vertical y técnica; para fases avanzadas."},{"s":"goblet-squat","n":"Sentadilla goblet","g":"Cuádriceps","d":"Sentadilla sujetando una mancuerna contra el pecho. La versión más fácil de aprender: siéntate hacia atrás como en una silla, pecho arriba."},{"s":"dumbbell-squat","n":"Sentadilla con mancuernas","g":"Cuádriceps","d":"Sentadilla con una mancuerna en cada mano. Sencilla de dosificar; baja hasta donde estés cómodo."},{"s":"bodyweight-squat","n":"Sentadilla peso corporal","g":"Cuádriceps","d":"Sentadilla sin peso: el patrón básico. Ideal para calentar; baja controlando y sube apretando glúteos."},{"s":"smith-machine-squat","n":"Sentadilla en multipower","g":"Cuádriceps","d":"Sentadilla en multipower (barra guiada): más estable que la libre. Pies ligeramente adelantados a la barra."},{"s":"hack-squat","n":"Sentadilla hack","g":"Cuádriceps","d":"Sentadilla en máquina hack, con la espalda apoyada en el respaldo inclinado. Buena progresión desde la prensa."},{"s":"leg-extensions","n":"Extensión de cuádriceps","g":"Cuádriceps","d":"Sentado, estira las rodillas contra el rodillo y baja con control. Peso ligero y aprieta arriba: fortalece el cuádriceps y protege la rodilla."},{"s":"barbell-lunge","n":"Zancadas con barra","g":"Cuádriceps","d":"Zancadas con barra a la espalda. Exigen equilibrio; empieza con mancuernas o sin peso."},{"s":"dumbbell-lunges","n":"Zancadas con mancuernas","g":"Cuádriceps","d":"Paso adelante y baja la rodilla trasera hacia el suelo, sube empujando con la pierna delantera. La rodilla delantera apunta al pie, no hacia dentro."},{"s":"dumbbell-rear-lunge","n":"Zancada hacia atrás mancuernas","g":"Cuádriceps","d":"Zancada dando el paso hacia atrás: más estable y amable con la rodilla que la zancada al frente."},{"s":"bodyweight-walking-lunge","n":"Zancadas caminando","g":"Cuádriceps","d":"Zancadas caminando sin peso. Buen ejercicio funcional cuando la rodilla esté fuerte."},{"s":"dumbbell-step-ups","n":"Subidas a cajón con mancuernas","g":"Cuádriceps","d":"Sube a un cajón o banco bajo con una pierna y baja con control. Empieza con un escalón bajo y sin peso; muy transferible al día a día."},{"s":"split-squat-with-dumbbells","n":"Sentadilla búlgara mancuernas","g":"Cuádriceps","d":"Sentadilla búlgara: pie trasero elevado en un banco. Intensa y avanzada; para cuando la rodilla y el equilibrio estén a punto."},{"s":"romanian-deadlift","n":"Peso muerto rumano","g":"Femoral y glúteo","d":"Con la barra o mancuernas pegadas a las piernas, empuja la cadera atrás bajando hasta media espinilla con la espalda recta. Notarás el estiramiento en los femorales; sube apretando glúteos."},{"s":"stiff-legged-barbell-deadlift","n":"Peso muerto piernas rígidas","g":"Femoral y glúteo","d":"Peso muerto con piernas casi rectas: más estiramiento femoral. Espalda neutra siempre; si se redondea, sube el punto de bajada."},{"s":"barbell-deadlift","n":"Peso muerto convencional","g":"Femoral y glúteo","d":"Peso muerto completo desde el suelo. Gran ejercicio pero técnico; el rumano es mejor punto de partida."},{"s":"lying-leg-curls","n":"Curl femoral tumbado","g":"Femoral y glúteo","d":"Tumbado boca abajo, flexiona las rodillas llevando el rodillo a los glúteos y baja despacio. Cadera pegada al banco."},{"s":"seated-leg-curl","n":"Curl femoral sentado","g":"Femoral y glúteo","d":"Curl femoral sentado: misma idea con la espalda apoyada. Muy cómodo y efectivo."},{"s":"standing-leg-curl","n":"Curl femoral de pie","g":"Femoral y glúteo","d":"Curl femoral de pie, una pierna cada vez. Útil si las otras máquinas están ocupadas."},{"s":"ball-leg-curl","n":"Curl femoral con fitball","g":"Femoral y glúteo","d":"Tumbado boca arriba con los talones sobre un fitball, eleva la cadera y flexiona las rodillas acercando la pelota. Femoral y glúteo sin máquinas."},{"s":"barbell-hip-thrust","n":"Hip thrust con barra","g":"Femoral y glúteo","d":"Con la espalda alta apoyada en un banco y la barra sobre la cadera, empuja hacia arriba apretando glúteos. Versión avanzada del puente; domina antes el puente en el suelo."},{"s":"barbell-glute-bridge","n":"Puente de glúteo con barra","g":"Femoral y glúteo","d":"Puente de glúteo en el suelo con barra sobre la cadera. Paso intermedio entre el puente sin peso y el hip thrust."},{"s":"butt-lift-bridge","n":"Puente de glúteo","g":"Femoral y glúteo","d":"Tumbado boca arriba con las rodillas flexionadas, eleva la cadera apretando los glúteos y aguanta 1 segundo arriba. Sencillo, seguro y muy efectivo: tu ejercicio de glúteo."},{"s":"glute-kickback","n":"Patada de glúteo","g":"Femoral y glúteo","d":"A cuatro patas, lleva el talón hacia el techo apretando el glúteo, sin arquear la lumbar."},{"s":"thigh-abductor","n":"Abducción de cadera en máquina","g":"Femoral y glúteo","d":"Sentado en la máquina, abre las piernas contra la resistencia. Fortalece el glúteo medio, que estabiliza cadera y rodilla al caminar."},{"s":"thigh-adductor","n":"Aducción de cadera en máquina","g":"Femoral y glúteo","d":"El movimiento contrario: cierra las piernas contra la resistencia. Trabaja los aductores del muslo interno."},{"s":"good-morning","n":"Buenos días con barra","g":"Femoral y glúteo","d":"Con la barra a la espalda, inclina el tronco empujando la cadera atrás. Muy técnico para la lumbar; el rumano es más seguro."},{"s":"one-arm-kettlebell-swings","n":"Swing con kettlebell a una mano","g":"Femoral y glúteo","d":"Balanceo de kettlebell con una mano: la cadera impulsa, no el brazo. Cardio y glúteo a la vez; requiere técnica, pídele una demo al monitor."},{"s":"standing-calf-raises","n":"Gemelos de pie","g":"Gemelos","d":"De pie en la máquina, ponte de puntillas todo lo alto que puedas y baja despacio dejando estirar el gemelo. Pausa arriba y abajo."},{"s":"barbell-seated-calf-raise","n":"Gemelos sentado con barra","g":"Gemelos","d":"Gemelo sentado con peso sobre las rodillas: trabaja el sóleo, la parte profunda. Reps lentas."},{"s":"calf-press-on-the-leg-press-machine","n":"Gemelos en prensa","g":"Gemelos","d":"En la prensa, apoya solo la punta de los pies en el borde de la plataforma y empuja con los tobillos. Cómodo y sin cargar la espalda."},{"s":"rocking-standing-calf-raise","n":"Gemelos de pie con barra","g":"Gemelos","d":"Gemelos de pie con barra, alternando puntillas y talones. Versión libre; requiere equilibrio."},{"s":"dumbbell-seated-one-leg-calf-raise","n":"Gemelo sentado una pierna mancuerna","g":"Gemelos","d":"Sentado, con una mancuerna sobre la rodilla, eleva el talón de una pierna. Aísla cada gemelo."},{"s":"plank","n":"Plancha","g":"Core","d":"Antebrazos y puntas de los pies en el suelo, cuerpo recto como una tabla: aprieta abdomen y glúteos, no dejes caer la cadera. Si es muy dura, apóyate con las rodillas."},{"s":"side-bridge","n":"Plancha lateral","g":"Core","d":"Plancha de lado sobre un antebrazo, cadera elevada y cuerpo alineado. Trabaja el core lateral; empieza con pocos segundos."},{"s":"crunches","n":"Crunch abdominal","g":"Core","d":"Tumbado con rodillas flexionadas, despega los omóplatos del suelo mirando al techo. Recorrido corto: no tires del cuello."},{"s":"cable-crunch","n":"Crunch en polea","g":"Core","d":"De rodillas frente a la polea alta con la cuerda tras la cabeza, encoge el tronco hacia abajo apretando el abdomen."},{"s":"ab-crunch-machine","n":"Crunch en máquina","g":"Core","d":"Crunch en máquina con resistencia regulable: la forma más cómoda de progresar en abdomen. Suelta el aire al encoger."},{"s":"3-4-sit-up","n":"Sit-up 3/4","g":"Core","d":"Incorporación parcial: sube tres cuartos del recorrido y baja con control. Más exigente que el crunch simple."},{"s":"cross-body-crunch","n":"Crunch cruzado","g":"Core","d":"Crunch llevando el codo hacia la rodilla contraria: añade rotación y trabaja los oblicuos."},{"s":"russian-twist","n":"Giro ruso","g":"Core","d":"Sentado con el tronco inclinado atrás, gira de lado a lado. Empieza con los pies apoyados en el suelo y sin peso."},{"s":"plate-twist","n":"Giro ruso con disco","g":"Core","d":"Giro ruso sujetando un disco: la versión con carga. Movimiento controlado, sin tirones."},{"s":"pallof-press","n":"Pallof press","g":"Core","d":"De pie, de lado a la polea, empuja el maneral al frente y resiste el giro que te pide el cable. El abdomen trabaja frenando: antirotación pura."},{"s":"pallof-press-with-rotation","n":"Pallof press con rotación","g":"Core","d":"Pallof añadiendo una rotación controlada al final. Versión avanzada del anterior."},{"s":"standing-cable-wood-chop","n":"Leñador en polea","g":"Core","d":"Leñador: lleva el maneral de arriba-fuera hacia abajo-dentro cruzando el cuerpo, girando desde el tronco. Peso moderado."},{"s":"hanging-leg-raise","n":"Elevación de piernas colgado","g":"Core","d":"Colgado de la barra, eleva las rodillas al pecho. Muy exigente; déjalo para más adelante o usa el respaldo de codos."},{"s":"flat-bench-lying-leg-raise","n":"Elevación de piernas en banco","g":"Core","d":"Tumbado en un banco, eleva las piernas rectas y bájalas sin arquear la lumbar. Flexiona las rodillas para hacerlo más fácil."},{"s":"mountain-climbers","n":"Escaladores","g":"Core","d":"En posición de plancha, lleva las rodillas al pecho alternando rápido. Cardio y core; con tu peso, ritmo moderado y muñecas fuertes."},{"s":"rope-jumping","n":"Salto a la cuerda","g":"Cardio","d":"Salto de boxeador: saltos rasos, casi sin despegar, rebotando en la punta de los pies con las muñecas girando la cuerda. Superficie que no sea hormigón y progresión lenta: es el cardio que más dispara pulsaciones."},{"s":"fast-skipping","n":"Skipping rápido","g":"Cardio","d":"Skipping rápido elevando rodillas en el sitio. Alto impacto: para fases avanzadas."},{"s":"bicycling-stationary","n":"Bicicleta estática","g":"Cardio","d":"Bici estática: ajusta el sillín a la altura de la cadera y pedalea a ritmo conversacional. Cardio sin impacto ideal para tus rodillas."},{"s":"recumbent-bike","n":"Bicicleta reclinada","g":"Cardio","d":"Bici reclinada con respaldo: la opción más cómoda para espalda y rodillas. Perfecta para días suaves."},{"s":"air-bike","n":"Bicicleta de aire (assault)","g":"Cardio","d":"Bici de aire con brazos y piernas: intensidad alta muy rápido. Úsala solo en intervalos cortos y más adelante."},{"s":"elliptical-trainer","n":"Elíptica","g":"Cardio","d":"Elíptica: movimiento completo sin impacto. Buena alternativa a la cinta si las rodillas piden descanso."},{"s":"rowing-stationary","n":"Remo (máquina de remar)","g":"Cardio","d":"Máquina de remo: empuja primero con las piernas, luego tira con la espalda. Cardio completo sin impacto; técnica antes que velocidad."},{"s":"walking-treadmill","n":"Caminar en cinta","g":"Cardio","d":"Caminar en cinta: tu herramienta para los 7.000 pasos. Ritmo en el que puedas hablar; cuando se quede corto, sube la inclinación antes que la velocidad."},{"s":"jogging-treadmill","n":"Trote en cinta","g":"Cardio","d":"Trote en cinta: alto impacto para tu peso actual. Todavía no; la caminata inclinada da el mismo beneficio sin castigar rodillas."},{"s":"stairmaster","n":"Escaladora (stairmaster)","g":"Cardio","d":"Escaladora de peldaños: cardio intenso y sin impacto, quema muchísimo. Empieza con pocos minutos a ritmo lento."}];

/* ================= FASES por entrenos completados ================= */
function fase(n){
 if(n<=4)return{nombre:"Adaptación · Entrenos 1-4",max:2,
  cuerda:"Todavía sin cuerda: dispara las pulsaciones. Sáltala.",
  cinta:"Suave, ritmo de hablar. Hacia tus 7.000 pasos",bici:"10-15 min muy suave",
  nota:"2 series por ejercicio, pesos muy suaves (que sobren 4-5 reps). Cardio siempre pudiendo hablar frases enteras. Suelta el aire al empujar, nunca bloquees la respiración."};
 if(n<=8)return{nombre:"Adaptación · Entrenos 5-8",max:3,
  cuerda:"4 rondas: 15-20s salto / 60s descanso. Salto de boxeador, rasito.",
  cinta:"Ritmo cómodo. Hacia tus 7.000 pasos",bici:"15 min suave",
  nota:"3 series por ejercicio, pesos donde sobren 2-3 reps. Entra la cuerda, muy suave: si el pulso se dispara o la rodilla avisa, recorta."};
 if(n<=12)return{nombre:"Construcción · Entrenos 9-12",max:99,
  cuerda:"5 rondas: 20s / 40s descanso",
  cinta:"Puedes meter algo de inclinación. 7.000 pasos",bici:"15-20 min",
  nota:"Series completas. Cuando completes el rango alto de reps en todas las series, sube peso."};
 return{nombre:"Rutina plena · Entreno "+n,max:99,
  cuerda:"Progresiva: +1 ronda o +5s cada 4 entrenos, hasta asaltos de 2-3 min",
  cinta:"Inclinación o algo de ritmo. 7.000 pasos",bici:"20 min",
  nota:"Progresión normal de cargas. Cardio aún conversacional; en unas semanas metemos intensidad."};
}
const targetSeries=(ex,f)=>Math.min(ex.series,f.max);
function targetTxt(ex,f){
 if(ex.cuerda)return f.cuerda;
 if(ex.cinta)return f.cinta;
 if(ex.bici)return f.bici;
 if(ex.cardio&&ex.hint)return ex.reps;
 return targetSeries(ex,f)+"×"+ex.reps;
}

/* ================= ESTADO ================= */
let state=load();
function load(){
 try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);
  return{sessions:d.sessions||[],overrides:d.overrides||{}};}}catch(e){}
 return{sessions:[],overrides:{}};
}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){alert("No se pudo guardar (almacenamiento lleno o modo privado)")}}
function efectivo(ex){
 const o=state.overrides[ex.id];
 if(!o)return ex;
 return{...ex,nombre:o.n,img:o.s,swapped:true};
}

/* ================= UTIL ================= */
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}
const fmt=iso=>new Date(iso).toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtSeries=(arr,cardio)=>arr.map(s=>cardio?(s.r||s.p):`${s.p||"?"}×${s.r||"?"}`).join(" · ");
const fmtDur=s=>{if(!s)return"";const m=Math.floor(s/60);return m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m} min`};

/* ================= NAVEGACIÓN ================= */
let vista="inicio",diaActivo=null,datos={},extrasDia=[],abierta=null,exSel=null,picker=null,detalle=null,calOff=0;
const $=id=>document.getElementById(id);
function toast(msg,ok=true){
 const t=document.createElement("div");t.className="toast"+(ok?"":" warn");t.textContent=msg;
 document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function nav(v){vista=v;picker=null;detalle=null;if(v!=="dia")cronStop();render()}

function render(){

 if(vista==="inicio")app.innerHTML=viewInicio();

  .map(t=>{const[k,l]=t.split("|");return `<button class="tab ${vista===k?"on":""}" onclick="nav('${k}')">${l}</button>`}).join("");
 $("app").scrollTop=0;
}

/* ---------- Inicio (calendario) ---------- */
function diasGym(){
 const s=new Set();
 state.sessions.forEach(x=>{const d=new Date(x.fecha);s.add(d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate())});
 return s;
}
function viewInicio(){
 const hoy=new Date();
 const base=new Date(hoy.getFullYear(),hoy.getMonth()+calOff,1);
 const mesNombre=base.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
 const gym=diasGym();
 const primerDow=(base.getDay()+6)%7;
 const diasMes=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
 let celdas="";
 for(let i=0;i<primerDow;i++)celdas+=`<div class="cald off"></div>`;
 for(let d=1;d<=diasMes;d++){
  const esHoy=calOff===0&&d===hoy.getDate();
  const esGym=gym.has(base.getFullYear()+"-"+base.getMonth()+"-"+d);
  celdas+=`<div class="cald ${esGym?"gym":""} ${esHoy?"hoy":""}">${d}</div>`;
 }
 const semana=state.sessions.filter(s=>new Date(s.fecha)>=mondayOf(new Date()));
 const n=state.sessions.length+1;
 const f=fase(n);
 return `<div class="rowflex" style="margin-bottom:14px">
  <div><h1>Mis <em>entrenos</em></h1><p class="sub" style="margin-bottom:0">Próximo: entreno nº ${n}</p></div>
  <button class="gear" onclick="nav('ajustes')">⚙</button>
 </div>
 <div class="cal">
  <div class="calhead">
   <button class="calnav" onclick="calOff--;render()">‹</button>
   <b>${esc(mesNombre)}</b>
   <button class="calnav" onclick="calOff++;render()">›</button>
  </div>
  <div class="calgrid">
   ${["L","M","X","J","V","S","D"].map(d=>`<div class="caldow">${d}</div>`).join("")}
   ${celdas}
  </div>
 </div>
 <div class="stats2">
  <div class="card"><b>${new Set(semana.map(s=>s.diaId)).size}/4</b><span>esta semana</span></div>
  <div class="card"><b>${state.sessions.length}</b><span>entrenos totales</span></div>
 </div>
 <button class="bigbtn" onclick="nav('rutina')">Ir a la rutina de hoy →</button>
 <div class="note"><b>${esc(f.nombre)}.</b> ${esc(f.nota)}</div>`;
}

/* ---------- Rutina ---------- */
function viewRutina(){
 const n=state.sessions.length+1;
 const f=fase(n);
 const semana=state.sessions.filter(s=>new Date(s.fecha)>=mondayOf(new Date()));
 const hechos=new Set(semana.map(s=>s.diaId));
 let h=`<h1>Rutina</h1>
 <p class="sub">Entreno nº ${n} · ${esc(f.nombre)} · esta semana ${hechos.size}/4</p>
 <div class="note"><b>Pauta actual.</b> ${esc(f.nota)}</div>`;
 h+=RUTINA.map(d=>{
  const done=hechos.has(d.id);
  return `<div class="card tap rowflex" onclick="abrirDia('${d.id}')">
   <div><p class="daytitle">${d.nombre}</p><p class="daysub">${d.sub}</p></div>
   <span class="badge ${done?"done":"todo"}">${done?"✓ Hecho":"Pendiente"}</span>
  </div>`;
 }).join("");
 const weeks={};
 const mAct=mondayOf(new Date()).getTime();
 state.sessions.forEach(s=>{
  const m=mondayOf(new Date(s.fecha)).getTime();
  if(m<mAct){weeks[m]=weeks[m]||new Set();weeks[m].add(s.diaId)}
 });
 const keys=Object.keys(weeks).map(Number).sort((a,b)=>b-a);
 if(keys.length){
  h+=`<label class="lbl" style="margin-top:16px">Semanas anteriores</label><div class="card">`+
   keys.map(k=>`<div class="weekline"><span class="n">Semana del ${fmt(new Date(k).toISOString())}</span><span><b>${weeks[k].size}/4</b></span></div>`).join("")+`</div>`;
 }

}

/* ---------- Cronómetro de sesión ---------- */
let cronIni=null,cronAcc=0,cronOn=false;
function cronStart(){cronIni=Date.now();cronAcc=0;cronOn=true}
function cronElapsed(){return cronAcc+(cronOn&&cronIni?Date.now()-cronIni:0)}
function cronToggle(){
 if(cronOn){cronAcc+=Date.now()-cronIni;cronOn=false}
 else{cronIni=Date.now();cronOn=true}
 pintaCrono();
 const b=$("cronbtn");if(b)b.textContent=cronOn?"⏸":"▶";
 const t=$("crondisp");if(t)t.classList.toggle("pausa",!cronOn);
}
function cronReset(){if(!confirm("¿Reiniciar el cronómetro de entrenamiento?"))return;cronIni=Date.now();cronAcc=0;cronOn=true;pintaCrono();const b=$("cronbtn");if(b)b.textContent="⏸";const t=$("crondisp");if(t)t.classList.remove("pausa")}
function cronStop(){cronOn=false;cronIni=null;cronAcc=0}
function pintaCrono(){
 const t=$("crondisp");if(!t)return;
 const s=Math.floor(cronElapsed()/1000);
 const hh=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;
 t.textContent=(hh?String(hh).padStart(2,"0")+":":"")+String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");
}
setInterval(pintaCrono,500);

/* ---------- Día ---------- */
function abrirDia(id){
 diaActivo=RUTINA.find(d=>d.id===id);
 const f=fase(state.sessions.length+1);
 datos={};extrasDia=[];
 diaActivo.ejercicios.forEach(ex=>{datos[ex.id]=Array.from({length:targetSeries(ex,f)},()=>({p:"",r:""}))});
 cronStart();
 vista="dia";render();
}
function prevDe(exId,nombre){
 for(const s of state.sessions){
  if(s.entradas[exId]&&s.entradas[exId].length){
   const nUsado=(s.nombres&&s.nombres[exId])||(ALLEX.find(e=>e.id===exId)||{}).nombre;
   if(nUsado===nombre)return s.entradas[exId];
  }
 }
 return null;
}
function prevExtra(nombre){
 for(const s of state.sessions){
  if(s.extras)for(const e of s.extras)if(e.n===nombre&&e.series.length)return e.series;
 }
 return null;
}
function viewDia(){
 const f=fase(state.sessions.length+1);
 let h=`<button class="back" onclick="nav('rutina')">← Volver sin guardar</button>
 <div class="swipehint">Desliza desde el borde izquierdo para volver</div>
 <h1>${diaActivo.nombre}</h1><p class="sub">${diaActivo.sub} · Entreno nº ${state.sessions.length+1}</p>
 <div class="crono">
  <span class="t" id="crondisp">00:00</span>
  <button class="cbtn" id="cronbtn" onclick="cronToggle()">⏸</button>
  <button class="cbtn warn" onclick="cronReset()">↺</button>
 </div>`;
 h+=diaActivo.ejercicios.map(exBase=>{
  const ex=efectivo(exBase);
  const prev=prevDe(ex.id,ex.nombre);
  const rows=datos[ex.id].map((s,i)=>{
   if(ex.cardio){
    const ph=(prev&&prev[i]&&prev[i].r)||targetTxt(exBase,f)||(ex.hint||"detalle");
    return `<div class="srow"><span class="n">S${i+1}</span>
     <input class="f ${s.r?"done":""}" placeholder="${esc(ph)}" value="${esc(s.r)}" oninput="setCampo('${ex.id}',${i},'r',this.value);this.classList.toggle('done',!!this.value)">
     <button class="x" onclick="rmSerie('${ex.id}',${i})">✕</button></div>`;
   }
   const pp=prev&&prev[i]&&prev[i].p?prev[i].p+" kg":"kg";
   const pr=prev&&prev[i]&&prev[i].r?prev[i].r+" reps":"reps";
   return `<div class="srow"><span class="n">S${i+1}</span>
    <input class="f ${s.p?"done":""}" type="number" inputmode="decimal" placeholder="${esc(pp)}" value="${esc(s.p)}" oninput="setCampo('${ex.id}',${i},'p',this.value);this.classList.toggle('done',!!this.value)">
    <input class="f ${s.r?"done":""}" type="number" inputmode="numeric" placeholder="${esc(pr)}" value="${esc(s.r)}" oninput="setCampo('${ex.id}',${i},'r',this.value);this.classList.toggle('done',!!this.value)">
    <button class="x" onclick="rmSerie('${ex.id}',${i})">✕</button></div>`;
  }).join("");
  return `<div class="ex"><div class="extop">
   <img class="exim" src="images/${ex.img}_0.jpg" data-f="0" data-ex="${ex.img}" onerror="this.style.display='none'">
   <div class="excontent"><div class="exhead"><h4>${esc(ex.nombre)}</h4><span class="target">${esc(targetTxt(exBase,f))}</span></div>
   ${prev?`<div class="prev">Última vez: <b>${esc(fmtSeries(prev,ex.cardio))}</b></div>`:""}
   ${ex.swapped?`<div class="prev" style="color:var(--acc)">⇄ ejercicio sustituido</div>`:""}</div>
   <button class="swap" title="Cambiar ejercicio" onclick="abrirPicker('swap','${ex.id}')">⇄</button></div>
  ${rows}<button class="addset" onclick="addSerie('${ex.id}')">+ Añadir serie</button></div>`;
 }).join("");
 h+=extrasDia.map((e,idx)=>{
  const prev=prevExtra(e.n);
  const rows=e.series.map((s,i)=>`<div class="srow"><span class="n">S${i+1}</span>
   <input class="f ${s.p?"done":""}" type="number" inputmode="decimal" placeholder="${prev&&prev[i]&&prev[i].p?esc(prev[i].p)+" kg":"kg"}" value="${esc(s.p)}" oninput="setExtra(${idx},${i},'p',this.value);this.classList.toggle('done',!!this.value)">
   <input class="f ${s.r?"done":""}" type="number" inputmode="numeric" placeholder="${prev&&prev[i]&&prev[i].r?esc(prev[i].r)+" reps":"reps / min"}" value="${esc(s.r)}" oninput="setExtra(${idx},${i},'r',this.value);this.classList.toggle('done',!!this.value)">
   <button class="x" onclick="rmSerieExtra(${idx},${i})">✕</button></div>`).join("");
  return `<div class="ex"><div class="extop">
   ${e.s?`<img class="exim" src="images/${e.s}_0.jpg" data-f="0" data-ex="${e.s}" onerror="this.style.display='none'">`:""}
   <div class="excontent"><div class="exhead"><h4>${esc(e.n)}</h4><span class="target">extra de hoy</span></div>
   ${prev?`<div class="prev">Última vez: <b>${esc(fmtSeries(prev,false))}</b></div>`:""}</div>
   <button class="swap" onclick="quitarExtra(${idx})">✕</button></div>
  ${rows}<button class="addset" onclick="addSerieExtra(${idx})">+ Añadir serie</button></div>`;
 }).join("");
 h+=`<button class="addex" onclick="abrirPicker('add')">＋ Añadir ejercicio a este entreno</button>
 <div style="height:70px"></div><button class="savebtn" onclick="guardarSesion()">Guardar entreno</button>`;
 return h;
}
function setCampo(exId,i,c,v){datos[exId][i][c]=v}
function addSerie(exId){datos[exId].push({p:"",r:""});render()}
function rmSerie(exId,i){datos[exId].splice(i,1);render()}
function setExtra(idx,i,c,v){extrasDia[idx].series[i][c]=v}
function addSerieExtra(idx){extrasDia[idx].series.push({p:"",r:""});render()}
function rmSerieExtra(idx,i){extrasDia[idx].series.splice(i,1);render()}
function quitarExtra(idx){extrasDia.splice(idx,1);render()}

/* ---------- Picker ---------- */
function abrirPicker(modo,exId){picker={modo,exId};render()}
function cerrarPicker(){picker=null;render()}
function viewPicker(){
 const titulo=picker.modo==="swap"?"Sustituir ejercicio":"Añadir ejercicio";
 const conOverride=picker.modo==="swap"&&state.overrides[picker.exId];
 let h=`<div class="overlay" id="pickov">
 <button class="back" onclick="cerrarPicker()">← Cancelar</button>
 <div class="swipehint">Desliza desde el borde izquierdo para cancelar</div>
 <h1>${titulo}</h1>
 <p class="sub">${picker.modo==="swap"?"El cambio se guarda para los próximos entrenos (puedes restaurarlo)":"Solo para el entreno de hoy · quedará en el histórico"}</p>
 ${conOverride?`<button class="smallbtn" style="margin-bottom:12px" onclick="restaurarEx('${picker.exId}')">↩ Restaurar ejercicio original</button>`:""}
 ${picker.modo==="add"?`<div class="card" style="display:flex;gap:8px">
   <input class="f" id="customex" placeholder="O escribe uno personalizado...">
   <button class="cbtn" style="width:auto;padding:0 14px" onclick="addCustom()">Añadir</button></div>`:""}
 <input class="f" placeholder="Buscar ejercicio..." oninput="filtrar(this.value,'pickitem','pickgrupo')" style="margin-bottom:12px">`;
 const grupos=[...new Set(CATALOGO.map(c=>c.g))];
 h+=grupos.map(g=>`<div class="pickgrupo"><label class="lbl">${g}</label>`+
  CATALOGO.filter(c=>c.g===g).map(c=>`<div class="card pickitem" data-n="${esc(c.n.toLowerCase())} ${esc(c.g.toLowerCase())}" onclick="elegir('${c.s}')">
   <img class="exim" src="images/${c.s}_0.jpg" loading="lazy" onerror="this.style.display='none'">
   <div style="min-width:0"><div style="font-weight:600;font-size:14.5px">${esc(c.n)}</div><span class="groupchip">${g}</span></div>
  </div>`).join("")+`</div>`).join("");
 return h+`</div>`;
}
function filtrar(v,itemCls,grpCls){
 v=v.toLowerCase().trim();
 document.querySelectorAll("."+itemCls).forEach(el=>{el.style.display=el.dataset.n.includes(v)?"flex":"none"});
 document.querySelectorAll("."+grpCls).forEach(g=>{
  const any=[...g.querySelectorAll("."+itemCls)].some(el=>el.style.display!=="none");
  g.style.display=any?"block":"none";
 });
}
function elegir(slug){
 const c=CATALOGO.find(x=>x.s===slug);
 if(picker.modo==="swap"){
  state.overrides[picker.exId]={s:c.s,n:c.n};
  persist();toast("Ejercicio sustituido ⇄");
 }else{
  extrasDia.push({n:c.n,s:c.s,series:[{p:"",r:""},{p:"",r:""}]});
  toast("Añadido al entreno de hoy");
 }
 picker=null;render();
}
function addCustom(){

 extrasDia.push({n:v,s:null,series:[{p:"",r:""},{p:"",r:""}]});
 picker=null;render();

function restaurarEx(exId){

  <figure><img src="images/${c.s}_1.jpg" onerror="this.parentElement.style.display='none'"><figcaption>Final</figcaption></figure>

/* ---------- Guardar sesión ---------- */
function guardarSesion(){
 const entradas={},nombres={};let algo=false;
 diaActivo.ejercicios.forEach(exBase=>{
  const ex=efectivo(exBase);
  const hechas=datos[ex.id].filter(s=>s.p!==""||s.r!=="");
  if(hechas.length){entradas[ex.id]=hechas;nombres[ex.id]=ex.nombre;algo=true}
 });
 const extras=extrasDia.map(e=>({n:e.n,s:e.s,series:e.series.filter(s=>s.p!==""||s.r!=="")})).filter(e=>e.series.length);
 if(extras.length)algo=true;
 if(!algo){toast("Apunta al menos una serie",false);return}
 const dur=Math.round(cronElapsed()/1000);
 state.sessions.unshift({fecha:new Date().toISOString(),diaId:diaActivo.id,diaNombre:diaActivo.nombre,
  num:state.sessions.length+1,entradas,nombres,extras,dur});
 persist();toast("Entreno guardado 💪");nav("inicio");
}

/* ---------- Historial ---------- */
function viewHistorial(){
 let h=`<h1>Historial</h1><p class="sub">${state.sessions.length} entreno${state.sessions.length!==1?"s":""} registrado${state.sessions.length!==1?"s":""}</p>`;
 if(!state.sessions.length)return h+`<div class="empty">Aún no hay entrenos guardados.<br>Empieza por el Torso Empuje 🥊</div>`;
 h+=state.sessions.map((s,idx)=>{
  const open=abierta===idx;
  let det="";
  if(open){
   const lineas=Object.entries(s.entradas).map(([exId,series])=>{
    const ex=ALLEX.find(e=>e.id===exId);
    const nombre=(s.nombres&&s.nombres[exId])||(ex?ex.nombre:exId);
    return `<div class="ln"><span>${esc(nombre)}</span><span>${esc(fmtSeries(series,ex&&ex.cardio))}</span></div>`;
   }).join("");
   const lineasExtra=(s.extras||[]).map(e=>`<div class="ln"><span>＋ ${esc(e.n)}</span><span>${esc(fmtSeries(e.series,false))}</span></div>`).join("");
   det=`<div class="hdet">${lineas}${lineasExtra}
   <button class="smallbtn danger" style="margin-top:10px" onclick="event.stopPropagation();borrarSesion(${idx})">Borrar este entreno</button></div>`;
  }
  return `<div class="card hcard"><div class="top" onclick="abierta=${open?"null":idx};render()">
   <h4>${s.diaNombre}</h4><span class="fecha">${s.num?"nº"+s.num+" · ":""}${fmt(s.fecha)}${s.dur?"<br>"+fmtDur(s.dur):""}</span></div>${det}</div>`;
 }).join("");
 return h;
}
function borrarSesion(idx){if(!confirm("¿Borrar este entreno?"))return;state.sessions.splice(idx,1);abierta=null;persist();render()}

/* ---------- Progreso ---------- */
function viewProgreso(){
 const fuerza=ALLEX.filter(e=>!e.cardio);
 if(!exSel)exSel=fuerza[0].id;
 const pts=[];
 [...state.sessions].reverse().forEach(s=>{
  const arr=s.entradas[exSel];if(!arr)return;
  const max=Math.max(...arr.map(x=>parseFloat(x.p)||0));
  if(max>0)pts.push({fecha:s.fecha,kg:max});
 });
 let chart;
 if(pts.length<2){chart=`<div class="empty">${pts.length===1?"Con un solo registro aún no hay línea. ¡Sigue!":"Sin registros de este ejercicio todavía."}</div>`}
 else{
  const W=460,H=200,P=30;
  const kgs=pts.map(p=>p.kg);
  const min=Math.min(...kgs),max=Math.max(...kgs),rng=(max-min)||1;
  const X=i=>P+i*(W-2*P)/(pts.length-1);
  const Y=k=>H-P-((k-min)/rng)*(H-2*P);
  chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%">
   <polyline points="${pts.map((p,i)=>`${X(i)},${Y(p.kg)}`).join(" ")}" fill="none" stroke="var(--acc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
   ${pts.map((p,i)=>`<circle cx="${X(i)}" cy="${Y(p.kg)}" r="4.5" fill="var(--acc)"/><text x="${X(i)}" y="${Y(p.kg)-10}" fill="var(--ink)" font-size="12" text-anchor="middle" font-weight="700">${p.kg}</text>`).join("")}
   <text x="${P}" y="${H-6}" fill="var(--mut)" font-size="11">${fmt(pts[0].fecha)}</text>
   <text x="${W-P}" y="${H-6}" fill="var(--mut)" font-size="11" text-anchor="end">${fmt(pts[pts.length-1].fecha)}</text>
  </svg>`;
 }
 const last=pts.length?pts[pts.length-1].kg:"-";
 const best=pts.length?Math.max(...pts.map(p=>p.kg)):"-";
 return `<h1>Progreso</h1><p class="sub">Peso máximo por sesión</p>
 <select class="f" onchange="exSel=this.value;render()">
  ${fuerza.map(e=>{const ef=efectivo(e);return `<option value="${e.id}" ${e.id===exSel?"selected":""}>${esc(ef.nombre)} (${e.dia})</option>`}).join("")}
 </select>
 <div class="card">
  <div class="stat"><div><b>${last}${last!=="-"?" kg":""}</b><span>Último</span></div><div><b>${best}${best!=="-"?" kg":""}</b><span>Mejor</span></div><div><b>${pts.length}</b><span>Sesiones</span></div></div>
  ${chart}
 </div>`;
}

/* ---------- Biblioteca ---------- */
function viewEjercicios(){
 const grupos=[...new Set(CATALOGO.map(c=>c.g))];
 let h=`<h1>Ejercicios</h1><p class="sub">${CATALOGO.length} ejercicios · toca uno para ver su ficha</p>
 <input class="f" placeholder="Buscar ejercicio..." oninput="filtrar(this.value,'libitem','libgrupo')" style="margin-bottom:14px;width:100%">`;
 h+=grupos.map(g=>`<div class="libgrupo"><label class="lbl">${g}</label>`+
  CATALOGO.filter(c=>c.g===g).map(c=>`<div class="card libitem" data-n="${esc(c.n.toLowerCase())} ${esc(c.g.toLowerCase())}" onclick="abrirDetalle('${c.s}')">
   <img class="exim" src="images/${c.s}_0.jpg" loading="lazy" onerror="this.style.display='none'">
   <div style="min-width:0"><div style="font-weight:600;font-size:15px">${esc(c.n)}</div><span class="groupchip">${g}</span></div>
  </div>`).join("")+`</div>`).join("");
 return h;
}

/* ---------- Ajustes ---------- */
function viewAjustes(){
 const ov=Object.entries(state.overrides);
 return `<button class="back" onclick="nav('inicio')">← Inicio</button>
 <h1>Ajustes</h1><p class="sub">Datos y configuración</p>
 <div class="card">
  <label class="lbl">Progresión</label>
  <p class="sub" style="margin:0">Entrenos completados: <b style="color:var(--ink)">${state.sessions.length}</b>. La fase (series, cuerda, cardio) sube sola con tus entrenos: 1-4 adaptación con 2 series · 5-8 con 3 series y cuerda suave · 9-12 series completas · 13+ rutina plena.</p>
 </div>
 ${ov.length?`<div class="card"><label class="lbl">Ejercicios sustituidos</label>`+
  ov.map(([id,o])=>{const orig=ALLEX.find(e=>e.id===id);return `<div class="weekline"><span class="n">${esc(orig?orig.nombre:id)} → <b style="color:var(--ink)">${esc(o.n)}</b></span><button class="smallbtn" onclick="restaurarEx('${id}')">↩</button></div>`}).join("")+`</div>`:""}
 <div class="card">
  <label class="lbl">Copia de seguridad</label>
  <p class="sub" style="margin-top:0">Los datos viven en este iPhone. Exporta de vez en cuando por si cambias de móvil o borras Safari.</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
   <button class="smallbtn" onclick="exportar()">⬇ Exportar datos</button>
   <button class="smallbtn" onclick="document.getElementById('impfile').click()">⬆ Importar datos</button>
   <input type="file" id="impfile" accept=".json,application/json" style="display:none" onchange="importar(this)">
  </div>
 </div>
 <div class="card">
  <label class="lbl">Zona peligrosa</label>
  <button class="smallbtn danger" onclick="borrarTodo()">Borrar todos los datos</button>
 </div>
 <p class="sub" style="text-align:center;margin-top:20px">Mis Entrenos · fuerza + cardio conversacional 🥊</p>`;
}
function exportar(){
 const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);
 a.download="mis-entrenos-backup-"+new Date().toISOString().slice(0,10)+".json";
 document.body.appendChild(a);a.click();a.remove();
}
function importar(inp){
 const f=inp.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=()=>{try{
  const d=JSON.parse(r.result);
  if(!d.sessions||!Array.isArray(d.sessions))throw 0;
  state={sessions:d.sessions,overrides:d.overrides||{}};persist();toast("Datos importados ✓");render();
 }catch(e){toast("Fichero no válido",false)}};
 r.readAsText(f);inp.value="";
}
function borrarTodo(){
 if(!confirm("Esto borra TODO el historial. ¿Seguro?"))return;
 if(!confirm("¿Del todo seguro? No hay vuelta atrás (salvo backup)."))return;
 state={sessions:[],overrides:{}};persist();toast("Datos borrados");render();
}

/* ---------- Toque en imágenes (fiable en iOS) ---------- */
(function(){
 let moved=false,sx=0,sy=0;
 document.addEventListener("touchstart",e=>{
  const t=e.touches[0];sx=t.clientX;sy=t.clientY;moved=false;
 },{passive:true});
 document.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  if(Math.abs(t.clientX-sx)>10||Math.abs(t.clientY-sy)>10)moved=true;
 },{passive:true});
 function toggle(el){
  const f=el.dataset.f==="0"?"1":"0";
  el.dataset.f=f;
  el.src="images/"+el.dataset.ex+"_"+f+".jpg";
 }
 document.addEventListener("touchend",e=>{
  const el=e.target.closest(".exim");
  if(el&&el.dataset.ex&&!moved){e.preventDefault();toggle(el)}
 },{passive:false});
 document.addEventListener("click",e=>{
  const el=e.target.closest(".exim");
  if(el&&el.dataset.ex&&!("ontouchstart" in window))toggle(el);
 });
})();

/* ---------- Gesto: deslizar desde el borde izquierdo para volver ---------- */
(function(){
 let x0=null,y0=null;
 document.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  x0=t.clientX<=28?t.clientX:null;y0=t.clientY;
 },{passive:true});
 document.addEventListener("touchend",e=>{
  if(x0===null)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-x0,dy=Math.abs(t.clientY-y0);
  x0=null;
  if(dx>70&&dy<60){
   if(detalle){cerrarDetalle();return}
   if(picker){cerrarPicker();return}
   if(vista==="dia"){nav("rutina");return}
   if(vista==="ajustes"){nav("inicio");return}
  }
 },{passive:true});
})();

render();
if("serviceWorker" in navigator){
 window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{})});
}
</script>
